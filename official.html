<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adviora Official | Customer Support & Policy Assistance</title>

<!-- Google Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    font-family:'Poppins',sans-serif;

    background:#ffffff;

    color:#222;

    overflow-x:hidden;

}

html{

    scroll-behavior:smooth;

}
  /*====================================================
            OFFICIAL HEADER
====================================================*/

.official-header{

    position:sticky;

    top:0;

    width:100%;

    background:#ffffff;

    z-index:999;

    box-shadow:0 8px 30px rgba(0,0,0,.06);

    border-bottom:3px solid #f4b400;

}

.official-navbar{

    max-width:1400px;

    margin:auto;

    padding:15px 40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

/*==========================
        LOGO
===========================*/

.official-logo{

    display:flex;

    align-items:center;

    gap:12px;

}

.official-logo img{

    width:60px;

    border-radius:50%;

}

.official-logo-text h2{

    color:#0B2C66;

    font-size:28px;

    margin-bottom:3px;

    font-weight:800;

}

.official-logo-text p{

    color:#666;

    font-size:13px;
font-weight:500;
}

/*==========================
        MENU
===========================*/

.official-menu{

    display:flex;

    list-style:none;

    gap:35px;

}

.official-menu li{

    list-style:none;

}

.official-menu a{

    text-decoration:none;

    color:#0B2C66;

    font-size:17px;

    font-weight:600;

    transition:.3s;

}

.official-menu a:hover{

    color:#d62d2d;

}

/*==========================
        BUTTON
===========================*/

.official-btn{

    display:inline-block;

    padding:14px 30px;

    background:#f4b400;

    color:#0B2C66;

    text-decoration:none;

    border-radius:50px;

    font-weight:700;

    transition:.35s;

}

.official-btn:hover{

    background:#d62d2d;

    color:#ffffff;

    transform:translateY(-3px);

}
    .official-menu a.active{

    color:#d62d2d;

    font-weight:700;

    position:relative;

}

.official-menu a.active::after{

    content:"";

    position:absolute;

    left:0;

    bottom:-8px;

    width:100%;

    height:3px;

    background:#f4b400;

    border-radius:10px;

}

/*==========================
      RESPONSIVE
===========================*/

@media(max-width:992px){

    .official-navbar{

        flex-direction:column;

        gap:20px;

        padding:20px;

    }

    .official-menu{

        flex-wrap:wrap;

        justify-content:center;

        gap:20px;

    }

}

@media(max-width:768px){

    .official-logo{

        flex-direction:column;

        text-align:center;

    }

    .official-logo img{

        width:60px;

    }

    .official-logo-text h2{

        font-size:24px;

    }

    .official-menu{

        gap:15px;

    }

    .official-menu a{

        font-size:15px;

    }

    .official-btn{

        width:100%;

        text-align:center;

    }

}
    /*====================================================
            OFFICIAL WELCOME BANNER
====================================================*/

.official-banner{

    width:100%;

    height:700px;

    background:url("aobanner.png") center center/cover no-repeat;

    position:relative;

}

.official-banner-overlay{

    width:100%;

    height:100%;

    background:rgba(5,22,55,.20);

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

}

.official-banner-content{

    max-width:900px;

    padding:20px;

}

.official-tag{

    display:inline-block;

    background:rgba(255,255,255,.92);

    color:#d62d2d;

    padding:12px 30px;

    border-radius:50px;

    font-size:16px;

    font-weight:700;

    letter-spacing:2px;

    margin-bottom:25px;

}

.official-banner-content h1{

    font-size:78px;

    color:#ffffff;

    font-weight:800;

    margin-bottom:20px;

    text-shadow:0 10px 25px rgba(0,0,0,.35);

}

.official-banner-content p{

    font-size:28px;

    color:#ffffff;

    margin-bottom:45px;

    text-shadow:0 5px 15px rgba(0,0,0,.30);

}

.official-banner-btn{

    display:inline-block;

    padding:18px 42px;

    background:#f4b400;

    color:#0B2C66;

    text-decoration:none;

    border-radius:50px;

    font-size:18px;

    font-weight:700;

    transition:.35s;

}

.official-banner-btn:hover{

    background:#d62d2d;

    color:#ffffff;

    transform:translateY(-4px);

}

/*==========================
        MOBILE
===========================*/

@media(max-width:768px){

    .official-banner{

        height:520px;

    }

    .official-banner-content h1{

        font-size:44px;

    }

    .official-banner-content p{

        font-size:20px;

    }

    .official-tag{

        font-size:14px;

        padding:10px 24px;

    }

}
  </style>

</head>

<body>
  <!--====================================
        ADVIORA OFFICIAL HEADER
=====================================-->

<header class="official-header">

    <nav class="official-navbar">

        <!--========================
                LOGO
        =========================-->

        <div class="official-logo">

            <img src="official.png" alt="Adviora Official">

            <div class="official-logo-text">

                <h2>Adviora Official</h2>

                <p>Insurance Customer Support & Policy Assistance</p>

            </div>

        </div>

        <!--========================
                MENU
        =========================-->

        <ul class="official-menu">

            <li><a href="#home">Home</a></li>
            <li><a href="#home" class="active">Home</a></li>

            <li><a href="#services">Services</a></li>

            <li><a href="#support">Support Request</a></li>

            <li><a href="#faq">FAQ</a></li>

            <li><a href="#contact">Contact</a></li>

        </ul>

        <!--========================
                BUTTON
        =========================-->

        <a href="#support" class="official-btn">

            Need Help

        </a>

    </nav>

</header>
<!--====================================
        WELCOME BANNER
=====================================-->

<section id="home" class="official-banner">

    <div class="official-banner-overlay">

        <div class="official-banner-content">

            <span class="official-tag">
                WELCOME TO
            </span>

            <h1>
                Adviora Official
            </h1>

            <p>
                Your Trusted Insurance Support Partner
            </p>

            <a href="#support" class="official-banner-btn">
                Get Support →
            </a>

        </div>

    </div>

</section>
